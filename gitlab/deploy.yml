.deploy:
  stage: deploy
  when: manual
  tags:
    - "${SERVER_NAME}-deploy"
  script:
    - |
      echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY

      cat <<-EOF > env_file
        DATABASE_URL=$DATABASE_URL_PIPELINE
        DECODE_JWT_TOKEN=$DECODE_JWT_TOKEN
        VONAGE_API_KEY=$VONAGE_API_KEY
        VONAGE_API_SECRET=$VONAGE_API_SECRET
        EMAIL_SENDER_NAME=$EMAIL_SENDER_NAME
        EMAIL_SENDER_ADDRESS=$EMAIL_SENDER_ADDRESS
        EMAIL_SENDER_PASSWORD=$EMAIL_SENDER_PASSWORD
        EMAIL_SENDER_SMTP_SERVER=$EMAIL_SENDER_SMTP_SERVER
        OPENAI_KEY=$OPENAI_KEY
        ASSISTANT_ID=$ASSISTANT_ID
        API_PREFIX=$API_PREFIX
        STATIC_FOLDER=$STATIC_FOLDER
        EURONICS_API_PASSWORD=$EURONICS_API_PASSWORD_PIPELINE
        IS_DEV=$IS_DEV
        SWAGGER_KEY=$SWAGGER_KEY
        PROJECT_NAME=$PROJECT_NAME
        TELEGRAM_TOKEN=$TELEGRAM_TOKEN
        RESTIC_PASSWORD=$RESTIC_PASSWORD
        BACKUP_FOLDER=$BACKUP_FOLDER
        BACKUP_SSH_CONFIG=$BACKUP_SSH_CONFIG
        SERVER_NAME=$SERVER_NAME
      EOF

      docker build --no-cache -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
      docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
      docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
      docker push $CI_REGISTRY_IMAGE:latest

      docker rm -f "${CONTAINER_NEXT}" 2>/dev/null || true

      docker run --rm \
        --env-file env_file \
        $CI_REGISTRY_IMAGE:latest python -m alembic upgrade heads

      docker run -d --name ${CONTAINER_NEXT} \
        --env-file env_file \
        -p ${SECOND_PORT}:8080 \
        $CI_REGISTRY_IMAGE:latest

      sleep 10

      if curl --fail http://localhost:$SECOND_PORT/$API_PREFIX/; then
        docker rm -f ${CONTAINER_ACTIVE} 2>/dev/null || true
        docker run -d --restart unless-stopped \
          --name ${CONTAINER_ACTIVE} \
          --env-file env_file \
          -p ${FIRST_PORT}:8080 \
          -v $STATIC_FOLDER:$STATIC_FOLDER \
          -v $BACKUP_FOLDER:$BACKUP_FOLDER \
          -v /opt/docker-ssh:/root/.ssh:ro \
          $CI_REGISTRY_IMAGE:latest
        docker rm -f ${CONTAINER_NEXT} 2>/dev/null || true
      else
        docker logs ${CONTAINER_NEXT} || true
        exit 1
      fi

deploy_test:
  extends: .deploy
  variables:
    CONTAINER_ACTIVE: "${PROJECT_NAME}-test"
    CONTAINER_NEXT: "${PROJECT_NAME}-test-next"
    DATABASE_URL_PIPELINE: "${DATABASE_URL}_test"
    EURONICS_API_PASSWORD_PIPELINE: 0
    IS_DEV: 1
  before_script:
    - export FIRST_PORT="${PORT_TEST%%-*}"
    - export SECOND_PORT="${PORT_TEST#*-}"

deploy_prod:
  extends: .deploy
  only:
    - main
  variables:
    CONTAINER_ACTIVE: $PROJECT_NAME
    CONTAINER_NEXT: "${PROJECT_NAME}-next"
    DATABASE_URL_PIPELINE: $DATABASE_URL
    EURONICS_API_PASSWORD_PIPELINE: $EURONICS_API_PASSWORD
    IS_DEV: 0
  before_script:
    - export FIRST_PORT="${PORT_PROD%%-*}"
    - export SECOND_PORT="${PORT_PROD#*-}"
