stages:
  - deploy
  - lint
  - test

lint_backend:
  stage: lint
  image: python:3.11
  allow_failure: true
  interruptible: true
  tags:
    - linux
  rules:
    - if: '$CI_COMMIT_BRANCH != "main"'
  script:
    - pip install ruff
    - ruff check ./src ./tests --exit-non-zero-on-fix
    - ruff format ./src ./tests --exit-non-zero-on-fix

.rewrite_test_env: &rewrite_test_env |
  python - <<'PY'
  import os
  import re
  from pathlib import Path

  env_file = Path('.env.test')
  if not env_file.is_file():
    raise SystemExit(f'Missing expected env file: {env_file}')

  replacements = {
    'PGDATABASE': os.environ['POSTGRES_DB'],
    'PGUSER': os.environ['POSTGRES_USER'],
    'PGPASSWORD': os.environ['POSTGRES_PASSWORD'],
    'PGHOST': 'postgres',
    'PGPORT': '5432',
    'DATABASE_URL': os.environ['DATABASE_URL_TEST'],
  }
  for key in ('E2E_FRONTEND_URL', 'E2E_BACKEND_URL', 'SELENIUM_REMOTE_URL'):
    value = os.environ.get(key)
    if value:
      replacements[key] = value

  line_pattern = re.compile(r'^([A-Za-z_][A-Za-z0-9_]*)=')
  updated_lines = []
  seen = set()

  for line in env_file.read_text().splitlines():
    match = line_pattern.match(line)
    if match and match.group(1) in replacements:
      key = match.group(1)
      updated_lines.append(f'{key}={replacements[key]}')
      seen.add(key)
    else:
      updated_lines.append(line)

  for key, value in replacements.items():
    if key not in seen:
      updated_lines.append(f'{key}={value}')

  env_file.write_text('\n'.join(updated_lines) + '\n')
  PY

.python_test_template: &python_test_template
  stage: test
  image: python:3.11
  interruptible: true
  tags:
    - linux
  services:
    - name: postgres:15
      alias: postgres
  variables:
    POSTGRES_DB: test_${CI_JOB_ID}
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    DATABASE_URL_TEST: postgresql://postgres:postgres@postgres:5432/test_${CI_JOB_ID}
    DECODE_JWT_TOKEN: dummy
    PYTHONPATH: $CI_PROJECT_DIR
    PIP_ROOT_USER_ACTION: ignore
  before_script:
    - git config --global http.version HTTP/1.1
    - git config --global http.postBuffer 524288000
    - pip install --upgrade pip
    - pip install --retries 10 --timeout 120 ".[dev]"
    - *rewrite_test_env

unit_tests:
  <<: *python_test_template
  rules:
    - if: '$CI_COMMIT_BRANCH != "main"'
  script:
    - pytest ./tests/unit

e2e_tests:
  <<: *python_test_template
  services:
    - name: postgres:15
      alias: postgres
  rules:
    - if: '$CI_COMMIT_BRANCH != "main" && $CI_ITALCO_FE_USERNAME && $CI_ITALCO_FE_TOKEN'
  artifacts:
    when: always
    paths:
      - frontend.log
  variables:
    POSTGRES_DB: test_${CI_JOB_ID}
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    DATABASE_URL_TEST: postgresql://postgres:postgres@postgres:5432/test_${CI_JOB_ID}
    DECODE_JWT_TOKEN: dummy
    CHROME_BIN: /usr/bin/chromium
    ITALCO_FE_DIR: $CI_PROJECT_DIR/.e2e/italco-fe
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends curl git ca-certificates gnupg chromium chromium-driver
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y --no-install-recommends nodejs
    - pip install --upgrade pip
    - pip install --retries 10 --timeout 120 ".[dev]"
    - *rewrite_test_env
    - mkdir -p "$(dirname "$ITALCO_FE_DIR")"
    - |
      if [ -d "$ITALCO_FE_DIR/.git" ]; then
        git -C "$ITALCO_FE_DIR" remote set-url origin "https://$CI_ITALCO_FE_USERNAME:$CI_ITALCO_FE_TOKEN@gitlab.com/generic-lab/italco/italco-fe.git"
        git -C "$ITALCO_FE_DIR" fetch --depth 1 origin
        git -C "$ITALCO_FE_DIR" reset --hard FETCH_HEAD
        git -C "$ITALCO_FE_DIR" clean -fdx
      else
        git clone --depth 1 "https://$CI_ITALCO_FE_USERNAME:$CI_ITALCO_FE_TOKEN@gitlab.com/generic-lab/italco/italco-fe.git" "$ITALCO_FE_DIR"
      fi
    - cd "$ITALCO_FE_DIR" && npm ci --no-audit --no-fund && cd "$CI_PROJECT_DIR"
  script:
    - |
      # Use the container's real network IP so headless Chromium can reach services
      # (loopback 127.0.0.1 is sometimes unreachable from the Chrome renderer inside Docker)
      CONTAINER_IP=$(hostname -I | tr ' ' '\n' | grep -m1 '^[0-9]\+\.[0-9]\+\.[0-9]\+\.[0-9]\+$')
      export E2E_BACKEND_URL="http://${CONTAINER_IP}:8080/"
      export E2E_FRONTEND_URL="http://${CONTAINER_IP}:3000"
      export E2E_BACKEND_HOST=0.0.0.0
      export E2E_BACKEND_STARTUP_TIMEOUT=120

      cd "$ITALCO_FE_DIR"
      VITE_HOSTNAME="${E2E_BACKEND_URL%/}/" VITE_SECRET_KEY="local-dev-key-1234567890" VITE_IV="1234567890123456" npm run build
      HOST=0.0.0.0 PORT=3000 npm run serve > "$CI_PROJECT_DIR/frontend.log" 2>&1 &
      cd "$CI_PROJECT_DIR"

      # Wait for the frontend to become ready
      python -c "
      from time import sleep, time
      from urllib.request import urlopen
      import os
      deadline = time() + 30
      url = os.environ['E2E_FRONTEND_URL'].rstrip('/') + '/'
      while time() < deadline:
        try:
          with urlopen(url, timeout=2):
            break
        except Exception:
          sleep(0.5)
      else:
        raise SystemExit(f'Frontend did not become ready at {url}')
      "

      pytest -m "e2e" ./tests/e2e -vv
      cat frontend.log || true

.deploy_template: &deploy_template
  stage: deploy
  script:
    - |
      if [ "$CI_JOB_NAME" = "deploy_test" ]; then
        PJ_NAME="${PROJECT_NAME}-test"
        CONTAINER_ACTIVE="${PROJECT_NAME}-test"
        CONTAINER_NEXT="${PROJECT_NAME}-test-next"
        FIRST_PORT="${PORT_TEST%%-*}"
        SECOND_PORT="${PORT_TEST#*-}"
        VITE_HOSTNAME="${DATABASE_URL}_test"
        EURONICS_API_PASSWORD=0
        STATIC_FOLDER=$STATIC_FOLDER_TEST
        IS_DEV=1
      else
        PJ_NAME="${PROJECT_NAME}"
        CONTAINER_ACTIVE="${PROJECT_NAME}"
        CONTAINER_NEXT="${PROJECT_NAME}-next"
        FIRST_PORT="${PORT_PROD%%-*}"
        SECOND_PORT="${PORT_PROD#*-}"
        VITE_HOSTNAME="${DATABASE_URL}"
        EURONICS_API_PASSWORD=$EURONICS_API_PASSWORD
        STATIC_FOLDER=$STATIC_FOLDER_PROD
        IS_DEV=0
      fi

      cat <<-EOF > env_file
        DATABASE_URL=$VITE_HOSTNAME
        DECODE_JWT_TOKEN=$DECODE_JWT_TOKEN
        EURONICS_API_PASSWORD=$EURONICS_API_PASSWORD
        TELEGRAM_TOKEN=$TELEGRAM_TOKEN
        API_PREFIX=$API_PREFIX
        SWAGGER_KEY=$SWAGGER_KEY
        STATIC_FOLDER=$STATIC_FOLDER
        VONAGE_API_KEY=$VONAGE_API_KEY
        VONAGE_API_SECRET=$VONAGE_API_SECRET
        EMAIL_SENDER_NAME=$EMAIL_SENDER_NAME
        EMAIL_SENDER_ADDRESS=$EMAIL_SENDER_ADDRESS
        EMAIL_SENDER_PASSWORD=$EMAIL_SENDER_PASSWORD
        EMAIL_SENDER_SMTP_SERVER=$EMAIL_SENDER_SMTP_SERVER
        OPENAI_API_KEY=$OPENAI_API_KEY
        ASSISTANT_ID=$ASSISTANT_ID
        IS_DEV=$IS_DEV
      EOF

      docker build --no-cache -t $PJ_NAME:latest .
      docker rm -f "${CONTAINER_NEXT}" 2>/dev/null || true

      docker run --rm \
        --env-file env_file \
        -v $STATIC_FOLDER:$STATIC_FOLDER \
        $PJ_NAME:latest python -m alembic upgrade heads

      docker run -d --name ${CONTAINER_NEXT} \
        --env-file env_file \
        -v $STATIC_FOLDER:$STATIC_FOLDER \
        -p ${SECOND_PORT}:8080 \
        $PJ_NAME:latest

      sleep 10

      if curl -v http://localhost:$SECOND_PORT/api/; then
        docker rm -f ${CONTAINER_ACTIVE} 2>/dev/null || true
        docker run -d --restart unless-stopped \
          --name ${CONTAINER_ACTIVE} \
          --env-file env_file \
          -p ${FIRST_PORT}:8080 \
          -v $STATIC_FOLDER:$STATIC_FOLDER \
          $PJ_NAME:latest
        docker rm -f ${CONTAINER_NEXT} 2>/dev/null || true
      else
        docker logs ${CONTAINER_NEXT} || true
        exit 1
      fi

deploy_test:
  <<: *deploy_template
  tags:
    - deploy-local
  when: manual

deploy_prod:
  <<: *deploy_template
  tags:
    - deploy-local
  when: manual
  only:
    - main
