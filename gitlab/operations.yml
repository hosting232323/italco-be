.setup_database:
  stage: deploy
  image: postgres:17
  when: manual
  tags:
    - "${SERVER_NAME}-deploy"
  script:
    - export DB_URL="$DATABASE_URL_PIPELINE"
    - export DB_NAME=$(echo "$DB_URL" | awk -F/ '{print $NF}')
    - export BASE_URL="${DB_URL%/*}/postgres"

    - |
      EXISTS=$(psql "$BASE_URL" -tAc "SELECT 1 FROM pg_database WHERE datname='${DB_NAME}'")
      if [ "$EXISTS" = "1" ]; then
        echo "❌ Database '$DB_NAME' already exists. Failing job."
        exit 1
      fi

    - echo "Database does not exist. Creating..."
    - psql "$BASE_URL" -c "CREATE DATABASE ${DB_NAME};"
    - echo "✅ Database '$DB_NAME' created successfully."

setup_database_test:
  extends: .setup_database
  variables:
    DATABASE_URL_PIPELINE: "${DATABASE_URL}_test"

setup_database_prod:
  extends: .setup_database
  only:
    - main
  variables:
    DATABASE_URL_PIPELINE: "${DATABASE_URL}"

setup_nominatim:
  stage: deploy
  when: manual
  tags:
    - "${SERVER_NAME}-deploy"
  script:
    - |
      mkdir -p /home/gitlab-runner/nominatim/data

      if [ ! -f /home/gitlab-runner/nominatim/data/sud-latest.osm.pbf ]; then
        echo "📥 Download dati OSM..."
        wget -O /home/gitlab-runner/nominatim/data/sud-latest.osm.pbf https://download.geofabrik.de/europe/italy/sud-latest.osm.pbf
      else
        echo "✅ Dati OSM già presenti, skip download."
      fi

      cat > /home/gitlab-runner/nominatim/docker-compose.yml <<EOF
      version: "3.8"
      services:
        nominatim:
          image: mediagis/nominatim:4.3
          container_name: nominatim
          ports:
            - "${NOMINATIM_PORT}:8080"
          environment:
            - PBF_PATH=/data/sud-latest.osm.pbf
            - NOMINATIM_PASSWORD=nominatim
            - THREADS=2
          volumes:
            - ./data:/data
            - nominatim-data:/var/lib/postgresql/14/main
          shm_size: 1gb
          restart: unless-stopped
      volumes:
        nominatim-data:
      EOF

      if [ "$(docker inspect -f '{{.State.Running}}' nominatim 2>/dev/null)" = "true" ]; then
        echo "✅ Nominatim già in esecuzione, nessuna azione."
      else
        echo "🚀 Avvio Nominatim..."
        cd /home/gitlab-runner/nominatim && docker compose up -d
        echo "⏳ Primo avvio: import dati in corso, può richiedere ore."
        echo "👉 Monitora con: docker logs -f nominatim"
      fi
