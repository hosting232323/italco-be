<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Helvetica, sans-serif;
      font-size: 13px;
      margin: 0;
      color: #333;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 15px;
      margin-top: 20px;
      margin-bottom: -7px;
    }

    .section {
      margin-bottom: 20px;
    }

    .info-table, .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .info-table td,
    .data-table td,
    .data-table th {
      border: 1px solid #ccc;
      padding: 2px;
      vertical-align: auto;
    }

    .info-table td.long-label {
      font-weight: bold;
      background: #f2f2f2;
      width: 55%;
    }

    .info-table td.label {
      font-weight: bold;
      background: #f2f2f2;
      width: 30%;
    }

    .info-table td.short-label {
      font-weight: bold;
      background: #f2f2f2;
      width: 20%;
    }

    .data-table th {
      background-color: #f0f0f0;
      font-weight: bold;
      text-align: left;
    }

    .flex-row {
      display: flex;
      gap: 20px;
      justify-content: space-between;
    }

    .half-section {
      flex: 1;
    }

    .half-section h2 {
      font-size: 15px;
      margin-top: 0;
      padding-bottom: 5px;
      border-bottom: 1px solid #ccc;
    }
  </style>
</head>
<body>
  {% from "components/rae.html" import rae_block %}

  {% for rae_product in rae_products %}
    {{ rae_block(rae_product, customer, addressee, address, created_at) }}
  {% if not loop.last %}
  <div style="page-break-before: always;"></div>
  {% endif %}

  {% endfor %}
</body>
</html>
